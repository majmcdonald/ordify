<!DOCTYPE html>
<html>
<head>
    <title>Spotify Callback</title>
</head>
<body>
    <h1>Spotify Authentication Callback</h1>
    <div id="result">Processing...</div>

    <script>
        const CLIENT_ID = 'b421f7cca3fa43319ac361ebd4e63e75';
        const REDIRECT_URI = 'http://127.0.0.1:8000/callback.html';

        async function exchangeCodeForToken(code, codeVerifier) {
            try {
                document.getElementById('result').innerHTML = '<h2>Exchanging code for token...</h2>';
                
                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: REDIRECT_URI,
                        client_id: CLIENT_ID,
                        code_verifier: codeVerifier,
                    }),
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('result').innerHTML = `
                        <h2>Success! 🎉</h2>
                        <p><strong>Access Token:</strong> ${data.access_token ? 'Present' : 'Missing'}</p>
                        <p><strong>Token Type:</strong> ${data.token_type}</p>
                        <p><strong>Expires In:</strong> ${data.expires_in} seconds</p>
                        <p><strong>Refresh Token:</strong> ${data.refresh_token ? 'Present' : 'Missing'}</p>
                        <p><strong>Scope:</strong> ${data.scope}</p>
                    `;
                } else {
                    const errorData = await response.json();
                    document.getElementById('result').innerHTML = `
                        <h2>Token Exchange Failed</h2>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Error:</strong> ${errorData.error}</p>
                        <p><strong>Description:</strong> ${errorData.error_description || 'No description'}</p>
                    `;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h2>Token Exchange Error</h2>
                    <p><strong>Error:</strong> ${error.message}</p>
                `;
            }
        }

        // Check for callback
        if (window.location.search) {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const error = params.get('error');
            
            if (code) {
                const codeVerifier = sessionStorage.getItem('code_verifier');
                if (codeVerifier) {
                    exchangeCodeForToken(code, codeVerifier);
                } else {
                    document.getElementById('result').innerHTML = `
                        <h2>Error: Code Verifier Missing</h2>
                        <p>The code verifier was not found in session storage.</p>
                    `;
                }
            } else {
                document.getElementById('result').innerHTML = `
                    <h2>Authentication Error</h2>
                    <p><strong>Error:</strong> ${error}</p>
                    <p><strong>Full URL:</strong> ${window.location.href}</p>
                `;
            }
        } else if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');
            const error = params.get('error');
            
            if (accessToken) {
                document.getElementById('result').innerHTML = `
                    <h2>Success! 🎉</h2>
                    <p><strong>Access Token:</strong> Present</p>
                    <p><strong>Token:</strong> ${accessToken.substring(0, 20)}...</p>
                    <p><strong>Expires In:</strong> ${params.get('expires_in')} seconds</p>
                    <p><strong>Token Type:</strong> ${params.get('token_type')}</p>
                    <p><strong>Scope:</strong> ${params.get('scope')}</p>
                `;
            } else {
                document.getElementById('result').innerHTML = `
                    <h2>Authentication Error</h2>
                    <p><strong>Error:</strong> ${error}</p>
                    <p><strong>Full URL:</strong> ${window.location.href}</p>
                    <p><strong>Hash:</strong> ${window.location.hash}</p>
                `;
            }
        } else {
            document.getElementById('result').innerHTML = `
                <h2>No Parameters Found</h2>
                <p>URL: ${window.location.href}</p>
                <p>Search: ${window.location.search}</p>
            `;
        }
    </script>
</body>
</html>
